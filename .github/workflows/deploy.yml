name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:          "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Подставляем GAS_URL из секрета (python — без проблем со спецсимволами)
      - name: Inject GAS_URL into api.js
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          python3 - <<'EOF'
          import os, re
          gas_url = os.environ.get('GAS_URL', '')
          if not gas_url:
              print("GAS_URL secret not set — skipping")
              exit(0)
          path = 'frontend/api.js'
          content = open(path).read()
          new_content = re.sub(
              r"var GAS_URL = window\.GAS_URL \|\| '[^']*'",
              f"var GAS_URL = window.GAS_URL || '{gas_url}'",
              content
          )
          open(path, 'w').write(new_content)
          print(f"GAS_URL injected: {gas_url[:60]}...")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
