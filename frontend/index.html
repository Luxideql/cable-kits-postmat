<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#2481cc">
  <title>Кабельные комплекты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=20260413b">
</head>
<body>

<!-- Лоадер -->
<div id="loader">
  <div class="spinner"></div>
  <p>Загрузка...</p>
</div>

<!-- Шапка -->
<header class="hdr">
  <div class="hdr-title">📦 Кабельные комплекты</div>
  <div class="hdr-right">
    <div class="hdr-date" id="hdr-date"></div>
    <a class="hdr-sheets" href="https://docs.google.com/spreadsheets/d/1_M6Gp13wPXGKgp6diKq3vJNWZQBb5d_DNfGUuSMy4a0/edit" target="_blank" title="Открыть таблицу">
      📊 Таблица
    </a>
  </div>
</header>

<!-- Форма ввода -->
<div class="card" id="card-form">
  <div class="card-title">Ввод производства</div>

  <div class="form-row">
    <div class="field">
      <label class="lbl">Дата</label>
      <input type="date" id="f-date" class="inp">
    </div>
    <div class="field">
      <label class="lbl">Кто</label>
      <input type="text" id="f-name" class="inp" placeholder="Имя сотрудника">
    </div>
  </div>

  <div class="form-row">
    <div class="field">
      <label class="lbl">Длина кабеля</label>
      <select id="f-length" class="inp">
        <option value="">— выберите —</option>
      </select>
    </div>
    <div class="field">
      <label class="lbl">Количество, шт</label>
      <input type="number" id="f-qty" class="inp inp--qty" min="1" placeholder="0">
    </div>
  </div>

  <button class="btn-save" id="btn-save">✓ Сохранить</button>
  <div id="form-msg" class="form-msg"></div>
</div>

<!-- Состояние склада -->
<div class="card">
  <div class="ready-block">
    <div class="ready-label">Готово к сборке</div>
    <div class="ready-num" id="ready-num">—</div>
    <div class="ready-unit">комплектов</div>
  </div>

  <div id="bn-block" class="bn-block hidden"></div>

  <div class="section-label">
    Остатки по позициям
    <span class="edit-hint">— нажми на остаток чтобы изменить</span>
  </div>

  <div id="pos-list"></div>
</div>

<!-- Журнал -->
<div class="card">
  <div class="card-title">Журнал — <span id="j-date-label"></span></div>
  <div id="journal" class="journal">
    <div class="empty">Нет записей</div>
  </div>
</div>

<!-- Подвал -->
<div class="footer-row">
  <button class="btn-refresh" id="btn-refresh">↻ Обновить</button>
  <span class="last-upd" id="last-upd"></span>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="api.js?v=20260413b"></script>
<script src="app.js?v=20260413b"></script>

</body>
</html>
