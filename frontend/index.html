<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#2481cc">
  <title>Кабельные комплекты</title>
  <script>if(location.search.indexOf('v=13')<0){location.replace(location.pathname+'?v=13');}</script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Загрузка...</p>
</div>

<header class="hdr">
  <div class="hdr-title">📦 Комплекты</div>
  <div class="hdr-right">
    <input type="date" id="hdr-date" class="hdr-date-pick">
    <a class="hdr-sheets"
       href="https://docs.google.com/spreadsheets/d/1_M6Gp13wPXGKgp6diKq3vJNWZQBb5d_DNfGUuSMy4a0/edit"
       target="_blank">📊 Таблица</a>
  </div>
</header>

<!-- Статус -->
<div class="card card--status">
  <div class="status-row">
    <div class="ready-block">
      <div class="ready-num" id="ready-num">—</div>
      <div class="ready-unit">готово компл.</div>
    </div>
    <div id="bn-block" class="bn-block hidden"></div>
  </div>
</div>

<!-- Таблица распределения -->
<div class="card">
  <div class="card-title">
    Распределение по людям
    <span class="edit-hint">— нажми на ячейку чтобы задать план</span>
  </div>
  <div id="plan-table"></div>
</div>

<div class="footer-row">
  <button class="btn-refresh" id="btn-refresh">↻ Обновить</button>
  <span class="last-upd" id="last-upd"></span>
</div>

<div id="toast" class="toast"></div>

<script src="api.js?v=13"></script>
<script src="app.js?v=13"></script>
</body>
</html>
